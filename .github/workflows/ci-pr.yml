name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name-check:
    name: Branch Name Check
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name format
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          PATTERN='^(feature|fix|chore|docs|refactor|test)/.+'
          if [[ "$BRANCH" =~ $PATTERN ]]; then
            echo "Branch name OK: $BRANCH"
          else
            echo "::error::Branch name '$BRANCH' does not match required pattern."
            echo "::error::Expected format: feature/<slug>, fix/<slug>, chore/<slug>, docs/<slug>, refactor/<slug>, or test/<slug>"
            exit 1
          fi

  pr-title-check:
    name: PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .+'
          if [[ "$PR_TITLE" =~ $PATTERN ]]; then
            echo "PR title OK: $PR_TITLE"
          else
            echo "::error::PR title '$PR_TITLE' does not follow Conventional Commits format."
            echo "::error::Expected: <type>(<scope>): <description>"
            echo "::error::Types: feat, fix, docs, style, refactor, test, chore"
            echo "::error::Example: feat(gameplay): add player jump mechanic"
            exit 1
          fi
